<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Sparrow Search</title>
</head>
<body>

  <h1>Sparrow Search</h1>

  <form id="searchForm">
    <input type="text" id="query" placeholder="Search..." required>
    <button type="submit">Go</button>
  </form>

  <div id="results"></div>

  <script>
    document.getElementById("searchForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const q = document.getElementById("query").value;

      const res = await fetch(`https://shrill-bird-601c.waaizhassan4.workers.dev/?q=${encodeURIComponent(q)}`);
      const data = await res.json();

      const resultsDiv = document.getElementById("results");
      resultsDiv.innerHTML = "";

      data.results.forEach(r => {
        const item = document.createElement("div");
        item.innerHTML = `
          <h3><a href="${r.url}" target="_blank">${r.title}</a></h3>
          <p>${r.snippet}</p>
        `;
        resultsDiv.appendChild(item);
      });
    });
  </script>

</body>
</html>
