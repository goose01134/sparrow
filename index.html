<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparrow Search</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, sans-serif;
      max-width: 750px;
      margin: 50px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 54px;
      font-weight: 700;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 30px;
      color: #1a1a1a;
    }

    #searchForm {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    #query {
      flex: 1;
      padding: 12px 16px;
      font-size: 18px;
      font-family: "Playfair Display", serif;
      border: 1px solid #ccc;
      border-radius: 8px;
      transition: 0.2s;
    }

    #query:focus {
      border-color: #000;
      outline: none;
    }

    button {
      padding: 12px 22px;
      font-size: 18px;
      font-family: "Playfair Display", serif;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #333;
    }

    #tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    .tab-btn {
      padding: 10px 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: "Playfair Display", serif;
      font-size: 17px;
      letter-spacing: 0.4px;
      border-bottom: 2px solid transparent;
      transition: 0.2s;
    }

    .tab-btn.active {
      border-bottom: 2px solid #000;
      font-weight: 600;
    }

    #webResults div {
      margin-bottom: 28px;
    }

    #webResults h3 {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      margin-bottom: 6px;
    }

    #webResults a {
      color: #000;
      text-decoration: none;
    }

    #webResults a:hover {
      text-decoration: underline;
    }

    #webResults p {
      font-size: 16px;
      line-height: 1.5;
      color: #444;
    }

    #imageResults {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    #imageResults img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      transition: 0.2s;
    }

    #imageResults img:hover {
      transform: scale(1.03);
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>

<body>
  <h1>Sparrow Search</h1>

  <form id="searchForm">
    <input type="text" id="query" placeholder="Search..." required>
    <button type="submit">Go</button>
  </form>

  <div id="tabs">
    <button class="tab-btn active" data-tab="web">Web</button>
    <button class="tab-btn" data-tab="images">Images</button>
  </div>

  <div id="webPanel" class="tab-panel active">
    <div id="webResults"></div>
  </div>

  <div id="imagesPanel" class="tab-panel">
    <div id="imageResults"></div>
  </div>

  <script>
    var WORKER_URL = "https://shrill-bird-601c.waaizhassan4.workers.dev";
    var currentTab = "web";
    var lastQuery = "";

    /* ---------- GS4 SAFE FETCH ---------- */
    function sparrowFetch(url) {
      if (window.fetch) {
        return fetch(url);
      }

      return new Promise(function(resolve, reject) {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", url, true);

        xhr.onload = function() {
          resolve({
            json: function() {
              return Promise.resolve(JSON.parse(xhr.responseText));
            },
            text: function() {
              return Promise.resolve(xhr.responseText);
            }
          });
        };

        xhr.onerror = reject;
        xhr.send();
      });
    }

    /* ---------- PRIVATE REDIRECT ---------- */
    function privateLink(url) {
      return WORKER_URL + "/redirect?url=" + encodeURIComponent(url);
    }

    /* ---------- TABS ---------- */
    var tabButtons = document.querySelectorAll(".tab-btn");
    for (var i = 0; i < tabButtons.length; i++) {
      tabButtons[i].addEventListener("click", function() {
        for (var j = 0; j < tabButtons.length; j++) {
          tabButtons[j].classList.remove("active");
        }
        var panels = document.querySelectorAll(".tab-panel");
        for (var k = 0; k < panels.length; k++) {
          panels[k].classList.remove("active");
        }

        this.classList.add("active");
        currentTab = this.getAttribute("data-tab");
        document.getElementById(currentTab + "Panel").classList.add("active");

        if (lastQuery) runSearch(lastQuery, currentTab);
      });
    }

    /* ---------- SEARCH FORM ---------- */
    document.getElementById("searchForm").addEventListener("submit", function(e) {
      e.preventDefault();
      var q = document.getElementById("query").value;
      lastQuery = q;
      runSearch(q, currentTab);
    });

    function runSearch(q, tab) {
      if (tab === "web") {
        runWebSearch(q);
      } else {
        runImageSearch(q);
      }
    }

    /* ---------- WEB SEARCH ---------- */
    function runWebSearch(q) {
      var resultsDiv = document.getElementById("webResults");
      resultsDiv.innerHTML = "Loading...";

      sparrowFetch(WORKER_URL + "/?q=" + encodeURIComponent(q))
        .then(function(res) { return res.json(); })
        .then(function(data) {
          resultsDiv.innerHTML = "";

          var items = data.results || [];
          for (var i = 0; i < items.length; i++) {
            var r = items[i];
            var item = document.createElement("div");
            item.innerHTML =
              "<h3><a href='" + privateLink(r.url) + "'>" + r.title + "</a></h3>" +
              "<p>" + r.snippet + "</p>";
            resultsDiv.appendChild(item);
          }

          if (items.length === 0) {
            resultsDiv.innerHTML = "<p>No results found.</p>";
          }
        })
        .catch(function() {
          resultsDiv.innerHTML = "<p>Something went wrong.</p>";
        });
    }

    /* ---------- IMAGE SEARCH ---------- */
    function runImageSearch(q) {
      var resultsDiv = document.getElementById("imageResults");
      resultsDiv.innerHTML = "Loading...";

      sparrowFetch(WORKER_URL + "/?q=" + encodeURIComponent(q) + "&type=images")
        .then(function(res) { return res.json(); })
        .then(function(data) {
          resultsDiv.innerHTML = "";

          var items = data.results || [];
          for (var i = 0; i < items.length; i++) {
            var r = items[i];
            var a = document.createElement("a");
            a.href = privateLink(r.url);
            a.innerHTML =
              "<img src='" + (r.thumbnail || r.url) + "' alt='" + (r.title || "") + "'>";
            resultsDiv.appendChild(a);
          }

          if (items.length === 0) {
            resultsDiv.innerHTML = "<p>No image results found.</p>";
          }
        })
        .catch(function() {
          resultsDiv.innerHTML = "<p>Something went wrong.</p>";
        });
    }
  </script>
</body>
</html>
