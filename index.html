<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparrow Search</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Inter, sans-serif;
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      color: #222;
    }

    h1 {
      font-family: "Playfair Display", serif;
      font-size: 54px;
      text-align: center;
      margin-bottom: 30px;
    }

    /* Search bar */
    #searchForm {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }

    #query {
      flex: 1;
      padding: 12px 16px;
      font-size: 18px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      padding: 12px 22px;
      font-size: 18px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Search tabs */
    #tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      border-bottom: 1px solid #ddd;
    }

    .tab-btn {
      padding: 10px 18px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: "Playfair Display", serif;
      font-size: 17px;
      border-bottom: 2px solid transparent;
    }

    .tab-btn.active {
      border-bottom: 2px solid #000;
      font-weight: 600;
    }

    /* Results */
    #webResults div {
      margin-bottom: 28px;
    }

    #webResults h3 {
      font-family: "Playfair Display", serif;
      font-size: 22px;
      margin-bottom: 6px;
      cursor: pointer;
    }

    #webResults p {
      font-size: 16px;
      color: #444;
    }

    /* Image grid */
    #imageResults {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
    }

    #imageResults img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
    }

    /* Panels */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Browser tabs */
    #browserTabs {
      margin-top: 40px;
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }

    #tabBar {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      overflow-x: auto;
    }

    .browser-tab {
      padding: 8px 14px;
      background: #eee;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }

    .browser-tab.active {
      background: #000;
      color: #fff;
    }

    iframe {
      width: 100%;
      height: 80vh;
      border: none;
      display: none;
    }

    iframe.active {
      display: block;
    }
  </style>
</head>

<body>
  <h1>Sparrow Search</h1>

  <form id="searchForm">
    <input type="text" id="query" placeholder="Search..." required>
    <button type="submit">Go</button>
  </form>

  <div id="tabs">
    <button class="tab-btn active" data-tab="web">Web</button>
    <button class="tab-btn" data-tab="images">Images</button>
  </div>

  <div id="webPanel" class="tab-panel active">
    <div id="webResults"></div>
  </div>

  <div id="imagesPanel" class="tab-panel">
    <div id="imageResults"></div>
  </div>

  <!-- Private Browser Tabs -->
  <div id="browserTabs">
    <div id="tabBar"></div>
    <div id="tabContainer"></div>
  </div>

  <script>
    const WORKER_URL = "https://shrill-bird-601c.waaizhassan4.workers.dev";
    let currentTab = "web";
    let lastQuery = "";

    /* PRIVATE LINK (still logs clicks, but iframe prevents history) */
    function privateLink(url) {
      return `${WORKER_URL}/redirect?url=${encodeURIComponent(url)}`;
    }

    /* OPEN IN PRIVATE TAB */
    function openTab(url, title) {
      const id = "tab-" + Date.now();

      // Create tab button
      const tabBtn = document.createElement("button");
      tabBtn.className = "browser-tab";
      tabBtn.textContent = title;
      tabBtn.onclick = () => switchTab(id);
      document.getElementById("tabBar").appendChild(tabBtn);

      // Create iframe
      const iframe = document.createElement("iframe");
      iframe.src = url;
      iframe.id = id;
      document.getElementById("tabContainer").appendChild(iframe);

      switchTab(id);
    }

    function switchTab(id) {
      document.querySelectorAll(".browser-tab").forEach(btn => btn.classList.remove("active"));
      document.querySelectorAll("iframe").forEach(f => f.classList.remove("active"));

      document.querySelector(`.browser-tab[onclick*="${id}"]`).classList.add("active");
      document.getElementById(id).classList.add("active");
    }

    /* SEARCH TABS */
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
        document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
        btn.classList.add("active");
        currentTab = btn.dataset.tab;
        document.getElementById(currentTab + "Panel").classList.add("active");

        if (lastQuery) runSearch(lastQuery, currentTab);
      });
    });

    /* SEARCH FORM */
    document.getElementById("searchForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const q = document.getElementById("query").value;
      lastQuery = q;
      runSearch(q, currentTab);
    });

    async function runSearch(q, tab) {
      if (tab === "web") runWebSearch(q);
      else runImageSearch(q);
    }

    /* WEB SEARCH */
    async function runWebSearch(q) {
      const resultsDiv = document.getElementById("webResults");
      resultsDiv.innerHTML = "Loading...";

      try {
        const res = await fetch(`${WORKER_URL}/?q=${encodeURIComponent(q)}`);
        const data = await res.json();
        resultsDiv.innerHTML = "";

        (data.results || []).forEach(r => {
          const item = document.createElement("div");
          item.innerHTML = `
            <h3 onclick="openTab('${privateLink(r.url)}', '${r.title.replace(/'/g, "")}')">${r.title}</h3>
            <p>${r.snippet}</p>
          `;
          resultsDiv.appendChild(item);
        });

        if (!data.results || data.results.length === 0)
          resultsDiv.innerHTML = "<p>No results found.</p>";

      } catch {
        resultsDiv.innerHTML = "<p>Something went wrong.</p>";
      }
    }

    /* IMAGE SEARCH */
    async function runImageSearch(q) {
      const resultsDiv = document.getElementById("imageResults");
      resultsDiv.innerHTML = "Loading...";

      try {
        const res = await fetch(`${WORKER_URL}/?q=${encodeURIComponent(q)}&type=images`);
        const data = await res.json();
        resultsDiv.innerHTML = "";

        (data.results || []).forEach(r => {
          const img = document.createElement("img");
          img.src = r.thumbnail || r.url;
          img.onclick = () => openTab(privateLink(r.url), r.title || "Image");
          resultsDiv.appendChild(img);
        });

        if (!data.results || data.results.length === 0)
          resultsDiv.innerHTML = "<p>No image results found.</p>";

      } catch {
        resultsDiv.innerHTML = "<p>Something went wrong.</p>";
      }
    }
  </script>
</body>
</html>
